name: Deploy Sanity Studio

on:
  push:
    branches: ["master"]
    paths:
      - "abbie-digel/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: abbie-digel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: abbie-digel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Studio
        run: npm run deploy -- --yes
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_STUDIO_AUTH_TOKEN }}

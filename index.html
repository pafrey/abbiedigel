---
layout: base
title: Home
---

<section class="hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <h1>{{ site.data.home.heroHeading }}</h1>
        <p class="hero-description">{{ site.data.home.heroDescription }}</p>
      </div>
      <div class="hero-image">
        <img src="{% if site.data.home.heroImage %}{{ site.data.home.heroImage }}{% else %}/media/abbie-hero.jpg{% endif %}" alt="Abbie Digel" class="hero-img" />
      </div>
    </div>

    <div class="services-grid">
      {% for card in site.data.home.serviceCards %}
      <div class="service-card" style="margin-bottom: 3rem">
        <h3>{{ card.heading }}</h3>
        <p>{{ card.body }}</p>
        {% if card.linkHref %}
        <a href="{{ card.linkHref }}" class="service-link" style="display:block;margin-top:1rem">
          &rarr; {{ card.linkLabel }}
        </a>
        {% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>
